#========================================================
# Clash / Mihomo 程序员专用分流配置
#--------------------------------------------------------
# Name        : Developer Proxy Config
# Version     : v1.0
# Author      : basil
# Updated     : 2026-03
#
# 支持内核
#   ✔ Mihomo (推荐)
#   ✔ Clash Meta
#   ✔ Clash Verge / Clash Verge Rev
#   ✔ OpenClash Meta
#
# 不完全兼容
#   ✘ 旧版 Clash Core
#
#--------------------------------------------------------
# 核心特性
#
# • 企业级 DNS
#   Fake-IP + DoH + 国内外 DNS 分流
#
# • AI 服务优化
#   OpenAI / Claude / Perplexity 强制使用美国节点
#
# • 开发环境优化
#   GitHub / Docker / npm / pip 下载链路优化
#
# • Apple 服务策略
#   Apple 默认直连，Apple Music 单独分流
#
# • 国内流量直连
#   ChinaMax + ChinaIP + GEOIP(CN)
#
# • 智能节点策略
#   自动测速 + 自动故障切换 + 手动选择
#
#--------------------------------------------------------
# 适用场景
#
# • 程序员开发环境
# • GitHub / Docker / npm / pip
# • AI 工具 (ChatGPT / Claude / OpenRouter)
# • Mihomo / Clash Meta 客户端
#
# 推荐运行模式
#   TUN + Rule
#========================================================

#================ 🚀 快速上手 =================
# 1. 填入订阅地址
#    找到下面「订阅」章节的 `url: 订阅地址`，替换为你的订阅链接
#    支持普通 Clash 链接或 Base64 编码的订阅
#
# 2. 选择内核
#    推荐 Mihomo（原 Meta 内核），兼容 Clash Meta / Clash Verge
#
# 3. 导入配置
#    - 手动导入：Clash Verge / Clash for Windows 等客户端直接加载本文件
#    - 订阅地址：复制订阅链接，通过「订阅转换」工具（如 subclash.top）转为本配置格式
#
# 4. 启用 TUN 模式（如需代理游戏 / 微信 / Telegram）
#    开启 Clash 的 TUN + Rule 模式，透明代理所有流量
#
# 5. 检查节点
#    确认策略组「🔁 自动选择」有节点，「🧰 手动选择」可按需切换
#========================================================

#================ 基础设置 =================
port: 7890            # HTTP代理端口
socks-port: 7891      # SOCKS代理端口
redir-port: 7892      # Redir端口（透明代理）
mixed-port: 7893      # 混合端口（HTTP+SOCKS）
allow-lan: true       # 允许局域网设备连接
bind-address: "*"
mode: rule            # 使用规则分流
log-level: info
ipv6: false
external-controller: 127.0.0.1:9090

# 网络体验优化
unified-delay: true   # 统一延迟计算
tcp-concurrent: true  # TCP并发连接优化

# 内核增强功能（需要 Mihomo / Clash Meta 内核）
geodata-mode: true        # 使用 GeoData 数据库模式，提高 GEOIP / GEOSITE 规则匹配性能
find-process-mode: strict # 识别发起网络请求的进程（macOS / Windows / Linux 支持）

# 用户配置缓存
profile:
  store-selected: true    # 记住手动选择的节点
  store-fake-ip: true     # 缓存 Fake-IP 映射，提高 DNS 稳定性

# TCP连接稳定优化
keep-alive-idle: 600
keep-alive-interval: 30

# 协议嗅探（提高规则匹配准确度）
sniffer:
  enable: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080]
    QUIC:
      ports: [443]
  override-destination: true

#================ DNS =================
# Fake-IP 模式适合开发环境 / Docker / TUN
dns:
  enable: true
  ipv6: false
  listen: 127.0.0.1:1053
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  prefer-h3: true       # 优先使用 HTTP3 DNS
  cache-algorithm: arc  # DNS缓存算法 （ arc / arczh Mihomo推荐)

  # 不使用 Fake-IP 的域名
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "+.srv.nintendo.net"
    - "+.stun.playstation.net"
    - "+.captive.apple.com"
    - "*.pool.ntp.org"
    - "+.time.apple.com"
    - "+.time.windows.com"
    - "+.ntp.org"
    
  # 国内 DNS
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 国内 DoH
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

  # 代理服务器解析 DNS
  proxy-server-nameserver:
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query

  # 国外 DNS
  fallback:
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query

  fallback-filter:
    geoip: true
    geoip-code: CN

#================ 锚点模板 =================
# 订阅模板（统一健康检查）
provider: &provider
  type: http
  interval: 3600
  health-check:
    enable: true
    url: http://www.gstatic.com/generate_204
    interval: 1800

# 自动测速模板
auto-test: &auto_test
  type: url-test
  lazy: true
  url: http://www.gstatic.com/generate_204
  interval: 900
  tolerance: 50
  use: [Sub]

# 规则模板
rules-classical: &rules_classical {type: http, behavior: classical, interval: 86400}
rules-domain: &rules_domain {type: http, behavior: domain, interval: 86400}
rules-ip: &rules_ip {type: http, behavior: ipcidr, interval: 86400}

#================ 订阅 =================
proxy-providers:
  Sub:
    <<: *provider
    url: 订阅地址
    path: ./proxy_providers/sub.yaml

proxies: null

#================ 策略组 =================
proxy-groups:

# 🌍 全局策略
  - {name: 🌍 全局出口, type: select, proxies: [🔁 自动选择, 🇺🇸 美国节点, 🇭🇰 香港节点, 🇯🇵 日本节点, 🇸🇬 新加坡节点, 🇹🇼 台湾节点, 🧰 手动选择, DIRECT]}

# 🤖 AI服务
  - {name: 🤖 AI专线, type: fallback, url: https://api.openai.com/, interval: 300, proxies: [🤖 AI自动优选, 🔁 自动选择, 🇺🇸 美国节点, 🌍 全局出口, 🧰 手动选择, 🛟 最终兜底]}

# 🧑‍💻 开发工具
  - {name: 🧑‍💻 开发下载, type: select, proxies: [🧑‍💻 开发自动优选, 🔁 自动选择, 🇺🇸 美国节点, 🛟 最终兜底, DIRECT]}

# 🌐 常见服务
  - {name: 🌐 谷歌服务, type: select, proxies: [🇺🇸 美国节点, 🔁 自动选择, 🌍 全局出口, 🛟 最终兜底, DIRECT]}
  - {name: 🍎 苹果服务, type: select, proxies: [DIRECT, 🔁 自动选择, 🛟 最终兜底]}
  - {name: ✈️ 电报消息, type: select, proxies: [🔁 自动选择, 🇭🇰 香港节点, 🇯🇵 日本节点, 🇸🇬 新加坡节点, 🇺🇸 美国节点, 🛟 最终兜底, DIRECT]}
  - {name: 🐦 推特服务, type: select, proxies: [🔁 自动选择, 🇺🇸 美国节点, 🌍 全局出口, 🛟 最终兜底, DIRECT]}

# 🎬 国际媒体
  - {name: 🎬 国际媒体, type: select, proxies: [🔁 自动选择, 🇭🇰 香港节点, 🇯🇵 日本节点, 🇸🇬 新加坡节点, 🇺🇸 美国节点, 🛟 最终兜底, DIRECT]}
  - {name: 📺 哔哩哔哩, type: select, proxies: [DIRECT, 🇭🇰 香港节点, 🇹🇼 台湾节点]}

# 🎮 游戏
  - {name: 🎮 游戏平台, type: select, proxies: [🇭🇰 香港节点, DIRECT, 🔁 自动选择, 🇯🇵 日本节点, 🇸🇬 新加坡节点, 🇺🇸 美国节点]}

# 🚫 广告
  - {name: 🚫 广告拦截, type: select, proxies: [REJECT, DIRECT]}

# 🧰 手动节点
  - {name: 🧰 手动选择, type: select, use: [Sub], proxies: [DIRECT]}

# 🔁 全局自动测速
  - {name: 🔁 自动选择, <<: *auto_test}

# 🌏 地区节点
  - {name: 🇺🇸 美国节点, <<: *auto_test, filter: "美|US|(?i)States|American"}
  - {name: 🇭🇰 香港节点, <<: *auto_test, filter: "港|HK|(?i)Hong"}
  - {name: 🇯🇵 日本节点, <<: *auto_test, filter: "日|东京|JP|(?i)Japan"}
  - {name: 🇸🇬 新加坡节点, <<: *auto_test, filter: "新加坡|狮城|SG|(?i)Singapore"}
  - {name: 🇹🇼 台湾节点, <<: *auto_test, filter: "台|湾|TW|(?i)Taiwan"}
  
# ⚡ 专用测速
  - {name: 🤖 AI自动优选, type: url-test, lazy: true, url: https://api.openai.com/, interval: 900, tolerance: 100, use: [Sub], filter: "美|US|(?i)States|American"}
  - {name: 🧑‍💻 开发自动优选, type: url-test, lazy: true, url: https://github.com/robots.txt, interval: 900, tolerance: 80, use: [Sub], filter: "美|US|(?i)States|American|日|东京|JP|(?i)Japan|新加坡|狮城|SG|(?i)Singapore"}

# 🛟 最终兜底
  - {name: 🛟 最终兜底, type: fallback, url: http://www.gstatic.com/generate_204, interval: 600, proxies: [DIRECT, 🔁 自动选择]}

#================ 规则集 =================
